<style>
  :root{
    --navy:#152A56;
    --navy-light:#1E3A6E;
    --coral:#E2483D;
    --coral-light:#FAEEDA;
    --yellow:#F4C430;
    --yellow-light:#FAEEDA;
    --sky:#378ADD;
    --sky-light:#E6F1FB;
    --green:#4FA34A;
    --green-light:#EAF3DE;
    --purple-light:#EEEDFE;
    --purple-text:#3C3489;
    --pink-light:#FBEAE8;
    --pink-text:#993556;
    --amber-text:#854F0B;
    --bg:#FFFFFF;
    --bg-secondary:#F7F7F5;
    --border:rgba(21,42,86,0.12);
    --text:#152A56;
    --text-secondary:#5A6478;
    --text-tertiary:#9098A8;
    --radius-md:10px;
    --radius-lg:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:var(--bg-secondary);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .app{ max-width:480px; margin:0 auto; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; }

  header{
    background:var(--navy);
    padding-top:env(safe-area-inset-top);
    position:relative;
    overflow:hidden;
  }
  .header-top{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px 10px; position:relative; z-index:2;
  }
  .brand{ color:#fff; font-weight:700; font-size:17px; letter-spacing:-0.2px; }
  .brand small{ display:block; font-size:10px; font-weight:400; color:rgba(255,255,255,0.65); letter-spacing:0.3px; text-transform:uppercase; margin-top:1px;}
  .header-actions{ display:flex; align-items:center; gap:10px; }
  .lang-toggle{ display:flex; border:1px solid rgba(255,255,255,0.4); border-radius:8px; overflow:hidden; font-size:11px; font-weight:600;}
  .lang-toggle button{ background:none; border:none; color:#fff; padding:5px 10px; cursor:pointer; font-size:11px; font-weight:600; font-family:inherit;}
  .lang-toggle button.active{ background:#fff; color:var(--navy); }
  .bell{ width:18px; height:18px; color:#fff; opacity:0.85; }

  .hero-strip{ height:42px; position:relative; z-index:1; }
  .hero-strip svg{ display:block; width:100%; height:100%; }

  .dates-bar{
    display:flex; gap:8px; padding:12px 18px 14px; overflow-x:auto; -webkit-overflow-scrolling:touch;
    border-bottom:1px solid var(--border);
  }
  .dates-bar::-webkit-scrollbar{ display:none; }
  .day-chip{
    flex-shrink:0; padding:7px 13px; border-radius:var(--radius-md); font-size:13px; font-weight:500;
    border:1px solid var(--border); cursor:pointer; background:var(--bg); color:var(--text); white-space:nowrap;
  }
  .day-chip.active{ background:var(--navy); color:#fff; border-color:var(--navy); }

  nav.tabs{
    display:flex; border-bottom:1px solid var(--border); padding:0 18px; gap:6px;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
  }
  nav.tabs::-webkit-scrollbar{ display:none; }
  .tab-btn{
    background:none; border:none; padding:12px 4px; font-size:14px; font-weight:500; color:var(--text-tertiary);
    cursor:pointer; border-bottom:2px solid transparent; font-family:inherit; white-space:nowrap;
  }
  .tab-btn.active{ color:var(--navy); border-bottom-color:var(--coral); }

  main{ flex:1; padding:14px 18px 28px; }
  .view{ display:none; }
  .view.active{ display:block; }

  .cat-row{ display:flex; gap:6px; overflow-x:auto; padding-bottom:12px; -webkit-overflow-scrolling:touch; }
  .cat-row::-webkit-scrollbar{ display:none; }
  .cat-chip{
    flex-shrink:0; display:flex; align-items:center; gap:5px; padding:6px 11px; border-radius:var(--radius-md);
    font-size:12px; font-weight:500; border:1px solid var(--border); cursor:pointer; background:var(--bg); color:var(--text); white-space:nowrap;
  }
  .cat-chip.active{ background:var(--sky-light); color:#0C447C; border-color:transparent; }

  .card{
    border:1px solid var(--border); border-radius:var(--radius-lg); padding:13px 14px; margin-bottom:9px;
    display:flex; gap:11px; align-items:flex-start; background:var(--bg);
  }
  .card-time{ font-size:13px; font-weight:600; color:var(--text-secondary); min-width:44px; line-height:1.45; }
  .card-time .end{ display:block; font-size:11px; font-weight:400; color:var(--text-tertiary); }
  .card-body{ flex:1; min-width:0; }
  .card-title{ font-size:14.5px; font-weight:600; margin-bottom:3px; line-height:1.35; }
  .card-meta{ font-size:12px; color:var(--text-secondary); display:flex; align-items:center; gap:4px; margin-bottom:7px; flex-wrap:wrap; }
  .dot{ opacity:0.5; }
  .tags{ display:flex; gap:6px; flex-wrap:wrap; }
  .tag{ font-size:11px; font-weight:500; padding:3px 9px; border-radius:8px; }
  .tag.compet{ background:var(--yellow-light); color:var(--amber-text); }
  .tag.hors{ background:var(--green-light); color:#3B6D11; }
  .tag.avant{ background:var(--pink-light); color:var(--pink-text); }
  .tag.focus{ background:var(--purple-light); color:var(--purple-text); }
  .tag.payant{ background:var(--sky-light); color:#0C447C; }
  .tag.gratuit{ background:var(--green-light); color:#3B6D11; }
  .fav-btn{ background:none; border:none; cursor:pointer; padding:2px; flex-shrink:0; }
  .fav-btn svg{ width:19px; height:19px; }

  .empty{ text-align:center; padding:40px 0; color:var(--text-secondary); font-size:13.5px; }

  .stand-card{ border:1px solid var(--border); border-radius:var(--radius-lg); padding:12px 14px; margin-bottom:9px; display:flex; gap:12px; align-items:center; background:var(--bg); }
  .stand-icon{ width:38px; height:38px; border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:18px; }
  .stand-icon.food{ background:var(--yellow-light); color:var(--amber-text); }
  .stand-icon.craft{ background:var(--purple-light); color:var(--purple-text); }
  .stand-name{ font-size:14px; font-weight:600; margin-bottom:2px; }
  .stand-desc{ font-size:12px; color:var(--text-secondary); margin-bottom:4px; }
  .stand-zone{ font-size:11px; color:var(--text-tertiary); }

  .section-label{ font-size:12.5px; color:var(--text-secondary); font-weight:600; margin:18px 0 8px; text-transform:uppercase; letter-spacing:0.3px; }
  .section-label:first-child{ margin-top:0; }

  .link-row{ display:flex; gap:10px; margin-bottom:6px; }
  .social-btn{
    flex:1; border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px 0; text-align:center;
    text-decoration:none; color:var(--text); font-size:11px; font-weight:500;
  }
  .social-btn svg{ width:21px; height:21px; display:block; margin:0 auto 5px; }

  .info-card{ border:1px solid var(--border); border-radius:var(--radius-lg); padding:12px 13px; display:flex; align-items:center; gap:12px; margin-bottom:10px; text-decoration:none; color:var(--text); }
  .info-icon{ width:40px; height:40px; border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .info-title{ font-size:13.5px; font-weight:600; }
  .info-sub{ font-size:11.5px; color:var(--text-secondary); }
  .badge-soon{ font-size:10px; padding:3px 8px; border-radius:8px; background:var(--bg-secondary); color:var(--text-secondary); flex-shrink:0; }
  .chevron{ width:15px; height:15px; color:var(--text-tertiary); flex-shrink:0; }

  .ticket-btn{
    display:block; width:100%; background:var(--coral); color:#fff; text-align:center; padding:13px 0;
    border-radius:var(--radius-md); font-weight:600; font-size:14px; text-decoration:none; margin-top:6px;
  }

  iframe.spotify-embed{ border-radius:var(--radius-lg); width:100%; height:152px; border:none; }
</style>
</head>

function addMin(time, mins){
  const [h,m] = time.split(":").map(Number);
  const total = h*60+m+mins;
  const hh = Math.floor((total%1440)/60).toString().padStart(2,"0");
  const mm = (total%60).toString().padStart(2,"0");
  return hh+":"+mm;
}

  return filled
    ? '<svg viewBox="0 0 24 24" fill="#D4537E" stroke="#D4537E" stroke-width="2"><path d="M12 21s-7-4.5-9.5-9C.5 8 2 4 6 4c2.2 0 3.7 1.2 6 3.5C14.3 5.2 15.8 4 18 4c4 0 5.5 4 3.5 8-2.5 4.5-9.5 9-9.5 9z"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="#9098A8" stroke-width="2"><path d="M12 21s-7-4.5-9.5-9C.5 8 2 4 6 4c2.2 0 3.7 1.2 6 3.5C14.3 5.2 15.8 4 18 4c4 0 5.5 4 3.5 8-2.5 4.5-9.5 9-9.5 9z"/></svg>';
}

function toggleFav(id){
  const idx = favs.indexOf(id);
  if(idx>-1) favs.splice(idx,1); else favs.push(id);
  localStorage.setItem("bal_favs", JSON.stringify(favs));
  renderProgramme();
  renderFavoris();
}

function eventCardHtml(e){
  const title = lang==="fr" ? e.fr : e.es;
  const isFav = favs.includes(e.id);
  const endTime = addMin(e.time, e.dur);
  const typeLabel = e.type ? t().typeLabels[e.type] : null;
  return `<div class="card">
    <div class="card-time">${e.time}<span class="end">${t().fin} ${endTime}</span></div>
    <div class="card-body">
      <div class="card-title">${title}</div>
      <div class="card-meta">${e.place}<span class="dot">·</span>${e.dur} min</div>
      <div class="tags">
        ${typeLabel ? `<span class="tag ${e.type.startsWith('compet')?'compet':e.type}">${typeLabel}</span>` : ''}
        ${e.payant ? `<span class="tag payant">${t().payant}</span>` : (e.cat!=='cine' ? `<span class="tag gratuit">${t().gratuit}</span>` : (e.type==='hors' ? '' : ''))}
      </div>
    </div>
    <button class="fav-btn" onclick="toggleFav('${e.id}')" aria-label="favori">${heartIcon(isFav)}</button>
  </div>`;
}

function renderHeader(){
  document.getElementById("brandSub").textContent = t().sub;
  document.getElementById("tabProgramme").textContent = t().tabs.programme;
  document.getElementById("tabFavoris").textContent = t().tabs.favoris;
  document.getElementById("tabStands").textContent = t().tabs.stands;
  document.getElementById("tabInfos").textContent = t().tabs.infos;
  document.getElementById("lblSocial").textContent = t().social;
  document.getElementById("lblHashtag").textContent = t().hashtag;
  document.getElementById("hashtagSub").textContent = t().hashtagSub;
  document.getElementById("lblPlaylist").textContent = t().playlist;
  document.getElementById("lblGoodies").textContent = t().goodies;
  document.getElementById("goodiesSub").textContent = t().goodiesSub;
  document.getElementById("goodiesSoon").textContent = t().soon;
  document.getElementById("lblBillet").textContent = t().billet;
  document.getElementById("ticketBtn").textContent = t().ticketBtn;
}

function renderDays(){
  const el = document.getElementById("datesBar");
  el.innerHTML = days.map((d,i)=>`<div class="day-chip ${i===curDay?'active':''}" data-i="${i}">${d.label}</div>`).join("");
  el.querySelectorAll(".day-chip").forEach(n=>n.onclick=()=>{ curDay=+n.dataset.i; renderDays(); renderProgramme(); });
}

function renderCats(){
  const el = document.getElementById("catRow");
  el.innerHTML = cats.map(c=>`<div class="cat-chip ${c===curCat?'active':''}" data-c="${c}">${t().cats[c]}</div>`).join("");
  el.querySelectorAll(".cat-chip").forEach(n=>n.onclick=()=>{ curCat=n.dataset.c; renderCats(); renderProgramme(); });
}

function renderProgramme(){
  renderCats();
  const list = document.getElementById("programmeList");
  const filtered = events.filter(e=>e.day===curDay && (curCat==="all"||e.cat===curCat));
  list.innerHTML = filtered.length ? filtered.map(eventCardHtml).join("") : `<div class="empty">${t().emptyProg}</div>`;
}

function renderFavoris(){
  const list = document.getElementById("favorisList");
  const filtered = events.filter(e=>favs.includes(e.id)).sort((a,b)=> a.day-b.day || a.time.localeCompare(b.time));
  list.innerHTML = filtered.length ? filtered.map(eventCardHtml).join("") : `<div class="empty">${t().emptyFav}</div>`;
}

function standCardHtml(s){
  const name = lang==="fr" ? s.fr : s.es;
  const desc = lang==="fr" ? s.descFr : s.descEs;
  const zone = lang==="fr" ? s.zoneFr : s.zoneEs;
  const iconPath = s.icon==="food"
    ? '<path d="M5 4v9a3 3 0 1 0 6 0V4M8 4v6M11 4v6"/><path d="M17 4v16M17 4c3 0 4 2 4 5s-1 5-4 5"/>'
    : '<path d="M12 3l1.8 5.4L19 10l-5.2 1.6L12 17l-1.8-5.4L5 10l5.2-1.6z"/>';
  return `<div class="stand-card">
    <div class="stand-icon ${s.icon}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">${iconPath}</svg></div>
    <div style="flex:1;">
      <div class="stand-name">${name}</div>
      <div class="stand-desc">${desc}</div>
      <div class="stand-zone">${zone}</div>
    </div>
  </div>`;
}

function renderStandCats(){
  const el = document.getElementById("standCatRow");
  el.innerHTML = standCatsList.map(c=>`<div class="cat-chip ${c===curStandCat?'active':''}" data-c="${c}">${t().standCats[c]}</div>`).join("");
  el.querySelectorAll(".cat-chip").forEach(n=>n.onclick=()=>{ curStandCat=n.dataset.c; renderStandCats(); renderStands(); });
}

function renderStands(){
  renderStandCats();
  const list = document.getElementById("standsList");
  const filtered = stands.filter(s=>curStandCat==="all"||s.cat===curStandCat);
  list.innerHTML = filtered.map(standCardHtml).join("");
}

function setLang(l){
  lang = l;
  document.getElementById("btnFr").classList.toggle("active", l==="fr");
  document.getElementById("btnEs").classList.toggle("active", l==="es");
  document.documentElement.lang = l;
  renderHeader();
  renderProgramme();
  renderFavoris();
  renderStands();
}

document.getElementById("btnFr").onclick = ()=>setLang("fr");
document.getElementById("btnEs").onclick = ()=>setLang("es");

document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("view-"+btn.dataset.view).classList.add("active");
  };
});

renderHeader();
renderDays();
renderProgramme();
renderFavoris();
renderStands();

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
